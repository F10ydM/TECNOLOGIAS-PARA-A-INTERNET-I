
<!DOCTYPE html> ← Declara que é HTML5
<html lang="pt-BR"> ← Elemento raiz + idioma
<head> ← Metadados (não visíveis)
 <meta charset="UTF-8"> ← Codificação de caracteres
 <meta name="viewport"
 content="width=device-width, ← Responsividade
 initial-scale=1.0">
 <title>Minha Página</title> ← Título na aba do navegador
 <link rel="stylesheet"
 href="styles.css"> ← Vincula CSS externo
</head>
<body> ← Conteúdo visível
 <h1>Olá, Mundo!</h1>
 <p>Meu primeiro site.</p>
 <script src="script.js"> ← Vincula JavaScript
 </script>
</body>
</html>
